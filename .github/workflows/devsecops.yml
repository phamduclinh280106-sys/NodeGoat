name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt môi trường Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt các thư viện phụ thuộc (Dependencies)
        run: npm install

  sast_semgrep_scan:
    name: Semgrep check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài Semgrep
        run: python3 -m pip install semgrep

      # tạo rule
      - name: Tạo custom Semgrep rules cho NodeGoat
        run: |
          cat > nodegoat-security-rules.yml <<'RULES'
          rules:
            - id: nodegoat-open-redirect-query
              languages: [javascript]
              severity: ERROR
              message: "Open Redirect: res.redirect() sử dụng URL lấy trực tiếp từ query string."
              metadata:
                category: security
                cwe: "CWE-601"
                owasp: "A01:2021-Broken Access Control"
              patterns:
                - pattern: res.redirect(req.query.$PARAM)

            - id: nodegoat-idor-url-userid
              languages: [javascript]
              severity: ERROR
              message: "IDOR risk: userId được lấy từ URL parameter thay vì session của người dùng hiện tại."
              metadata:
                category: security
                cwe: "CWE-639"
                owasp: "A01:2021-Broken Access Control"
              patterns:
                - pattern: const { userId } = req.params;

          RULES

      - name: Quét bảo mật bằng Semgrep và xuất report JSON
        run: |
          semgrep scan \
            --config=auto \
            --config=nodegoat-security-rules.yml \
            --json \
            --output semgrep-report.json \
            .

      - name: Hiển thị tóm tắt Semgrep findings
        if: always()
        run: |
          if [ -f semgrep-report.json ]; then
            echo "Total Semgrep findings: $(jq '.results | length' semgrep-report.json)"
            echo "Selected NodeGoat findings: $(jq '[.results[] | select(.check_id | startswith("nodegoat-"))] | length' semgrep-report.json)"
          else
            echo "semgrep-report.json không tồn tại. Có thể bước Semgrep scan đã lỗi trước khi tạo report."
          fi

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json

  sast_sonarcloud_scan:
    name: SonarQube Cloud check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Quét bảo mật bằng SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=phamduclinh280106-sys_NodeGoat
            -Dsonar.organization=phamduclinh280106-sys

  sca_snyk_scan:
    name: Snyk check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Quét lỗ hổng thư viện bằng Snyk
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical
        continue-on-error: true

  dast_scan:
    needs: [sast_semgrep_scan, sast_sonarcloud_scan, sca_snyk_scan]
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    services:
      mongodb:
        image: mongo:4.4
        ports:
          - 27017:27017

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện NodeGoat
        run: npm install

      - name: Đổ dữ liệu mẫu vào Database
        run: npm run db:seed
        env:
          MONGODB_URI: mongodb://localhost:27017/nodegoat

      - name: Khởi động NodeGoat ngầm
        run: |
          npm start &
          npx wait-on http://localhost:4000 --timeout 60000
        env:
          MONGODB_URI: mongodb://localhost:27017/nodegoat
          PORT: 4000

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:4000'
          fail_action: false

  quality_gate:
    name: quality gate
    runs-on: ubuntu-latest
    needs: [sast_semgrep_scan, sast_sonarcloud_scan, sca_snyk_scan, dast_scan]
    steps:
      - name: Download Semgrep report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report

      - name: Fail nếu còn lỗi bảo mật tiêu biểu chưa fix
        run: |
          if [ ! -f semgrep-report.json ]; then
            echo "Không tìm thấy semgrep-report.json"
            exit 1
          fi

          SELECTED_COUNT=$(jq '[.results[] | select(.check_id | startswith("nodegoat-"))] | length' semgrep-report.json)
          echo "Selected NodeGoat security findings: $SELECTED_COUNT"

          jq -r '.results[]
            | select(.check_id | startswith("nodegoat-"))
            | "- " + .check_id + " | " + .path + ":" + (.start.line | tostring) + " | " + .extra.message' semgrep-report.json

          if [ "$SELECTED_COUNT" -gt 0 ]; then
            echo "Custom Security Gate FAILED: còn lỗi bảo mật tiêu biểu trong source code."
            echo "Hãy fix code, không chỉ đánh dấu ignore/accepted trên dashboard."
            exit 1
          fi

          echo "Custom Security Gate PASSED: không còn lỗi bảo mật tiêu biểu đã chọn."
