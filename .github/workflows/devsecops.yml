name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt môi trường Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt các thư viện phụ thuộc (Dependencies)
        run: npm install

  sast_semgrep_scan:
    name: Semgrep check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Quét bảo mật bằng Semgrep
        run: |
          python3 -m pip install semgrep
          semgrep scan --config=auto
        continue-on-error: true

  sast_sonarcloud_scan:
    name: SonarQube Cloud check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Quét bảo mật bằng SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=phamduclinh280106-sys_NodeGoat
            -Dsonar.organization=phamduclinh280106-sys

  sca_snyk_scan:
    name: Snyk check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Quét lỗ hổng thư viện bằng Snyk
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical
        continue-on-error: true

  dast_scan:
    needs: [sast_semgrep_scan, sast_sonarcloud_scan, sca_snyk_scan]
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    services:
      mongodb:
        image: mongo:4.4
        ports:
          - 27017:27017

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện NodeGoat
        run: npm install

      - name: Đổ dữ liệu mẫu vào Database
        run: npm run db:seed
        env:
          MONGODB_URI: mongodb://localhost:27017/nodegoat

      - name: Khởi động NodeGoat ngầm
        run: |
          npm start &
          npx wait-on http://localhost:4000 --timeout 60000
        env:
          MONGODB_URI: mongodb://localhost:27017/nodegoat
          PORT: 4000

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:4000'
          fail_action: false

  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [sast_semgrep_scan, sast_sonarcloud_scan, sca_snyk_scan, dast_scan]
    steps:
      - name: Kiểm tra kết quả pipeline
        run: |
          echo "Tất cả các bước scan đã hoàn thành."
          echo "Xem chi tiết kết quả tại:"
          echo "  - SonarCloud Dashboard"
          echo "  - Snyk Dashboard"
          echo "  - ZAP Report (GitHub Issues)"
